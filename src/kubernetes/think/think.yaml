apiVersion: v1
kind: Namespace
metadata:
  name: think

---

kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx
  namespace: think
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 80
---

kind: Service
apiVersion: v1
metadata:
  name: nginx
  namespace: think
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: nginx

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  namespace: think
spec:
  rules:
    - host: myserviceb.foo.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
  ingressClassName: nginx